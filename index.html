<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>👾 TOOL BCR V2 👾</title>

<style>
body{
  background:#000;
  font-family:Arial,sans-serif;
  color:#fff;
  margin:0;
  padding:0;
}
.wrap{
  max-width:400px;
  margin:20px auto;
  padding:20px;
  background:#000;
  border-radius:12px;
  box-shadow:0 0 20px #ff5f87,0 0 40px #ff5f87 inset;
}
h1{
  text-align:center;
  font-size:22px;
  color:#0ff;
  text-shadow:0 0 5px #0ff,0 0 10px #0ff;
}
label{
  display:block;
  margin-top:15px;
  color:#00faff;
  font-size:16px;
  text-shadow:0 0 5px #00faff;
}

/* Ẩn input gốc */
input{
  display:none;
}

/* Màn hình hiển thị */
.display{
  width:100%;
  padding:15px;
  margin-top:8px;
  border-radius:10px;
  border:2px solid #a24bff;
  background:#000;
  color:#fff;
  font-size:28px;
  text-align:center;
  box-sizing:border-box;
  box-shadow:0 0 8px #a24bff,0 0 12px #a24bff inset;
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}
.keypad button{
  padding:16px;
  border:none;
  border-radius:10px;
  font-size:22px;
  font-weight:bold;
  background:#111;
  color:#fff;
  box-shadow:0 0 10px #ff5f87;
}
.keypad button:active{
  transform:scale(0.95);
}

/* Action buttons */
#predictBtn{
  width:100%;
  margin-top:20px;
  padding:14px;
  font-size:20px;
  font-weight:bold;
  background:#ff5f87;
  color:#fff;
  border:none;
  border-radius:10px;
  box-shadow:0 0 10px #ff5f87,0 0 20px #ff5f87 inset;
}
#clearBtn{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* Predict box */
.predict{
  margin-top:25px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px #ff5f87,0 0 30px #ff5f87 inset;
  display:none;
}
.circle{
  width:130px;
  height:130px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-weight:800;
  margin:0 auto 15px;
  background:transparent;
}
.learnBtns{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:15px;
}

.learnBtns button{
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
}

.winP{
  background:#00bfff;
  box-shadow:0 0 12px #00bfff;
}

.winB{
  background:#ff3b3b;
  box-shadow:0 0 12px #ff3b3b;
}

.winD{
  background:#2eb82e;
  box-shadow:0 0 12px #2eb82e;
}
#predResult{
  text-align:center;
  font-size:24px;
  font-weight:800;
}

/* Flash */
@keyframes pulseRed{
  0%{box-shadow:0 0 20px #ff3b3b;background:#ff3b3b;}
  50%{box-shadow:0 0 40px #ff3b3b;transform:scale(1.1);}
  100%{box-shadow:0 0 20px #ff3b3b;background:#ff3b3b;}
}
@keyframes pulseBlue{
  0%{box-shadow:0 0 20px #00bfff;background:#00bfff;}
  50%{box-shadow:0 0 40px #00bfff;transform:scale(1.1);}
  100%{box-shadow:0 0 20px #00bfff;background:#00bfff;}
}
@keyframes pulseGreen{
  0%{box-shadow:0 0 20px #2eb82e;background:#2eb82e;}
  50%{box-shadow:0 0 40px #2eb82e;transform:scale(1.1);}
  100%{box-shadow:0 0 20px #2eb82e;background:#2eb82e;}
}
.flash-red{animation:pulseRed 1.5s infinite;color:#fff;}
.flash-blue{animation:pulseBlue 1.5s infinite;color:#fff;}
.flash-green{animation:pulseGreen 1.5s infinite;color:#fff;}

.activeBox{
  border-color:#ff5f87 !important;
  box-shadow:0 0 15px #ff5f87,0 0 20px #ff5f87 inset !important;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>👾 TOOL BCR V2 👾</h1>

  <label>PLAYER</label>
  <input id="player" type="number">
  <div id="displayPlayer" class="display activeBox">0</div>

  <label>BANKER</label>
  <input id="banker" type="number">
  <div id="displayBanker" class="display">0</div>

<div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="clearNum()">C</button>
    <button onclick="press(0)">0</button>
    <button onclick="switchBox()">↔</button>
  </div>

  <button id="predictBtn">🔮 Dự đoán</button>
  <button id="clearBtn">Xoá tất cả</button>

  <!-- NÚT AI TỰ HỌC -->
  <div class="learnBtns">
    <button onclick="vipRecord('PLAYER')" class="winP">PLAYER THẮNG</button>
    <button onclick="vipRecord('BANKER')" class="winB">BANKER THẮNG</button>
    <button onclick="vipRecord('HÒA')" class="winD">HÒA</button>
  </div>

  <div class="predict" id="predictBox">
    <div class="circle" id="predCircle">?</div>
    <div id="predResult">—</div>
  </div>
</div>

<script>
/* =========================
   VIP GOD AI ENGINE V30
========================= */

const HISTORY_KEY = "bcr_history_v30_god";
const MODEL_KEY = "bcr_model_v30_god";

const CONFIG = {
  shortTrend: 4,
  longTrend: 12,
  drawThreshold: 1,
  confidenceBase: 50
};

let current='player';

/* ===== UI ===== */
function switchBox(){
  current = current === 'player' ? 'banker' : 'player';

  document.getElementById('displayPlayer').classList.remove('activeBox');
  document.getElementById('displayBanker').classList.remove('activeBox');

  document.getElementById(
    current === 'player' ? 'displayPlayer' : 'displayBanker'
  ).classList.add('activeBox');
}

function press(num){
  const input = document.getElementById(current);
  const display = document.getElementById(
    current === 'player' ? 'displayPlayer' : 'displayBanker'
  );

  input.value = num;
  display.textContent = num;

  switchBox();
}

function clearNum(){
  const input = document.getElementById(current);
  const display = document.getElementById(
    current === 'player' ? 'displayPlayer' : 'displayBanker'
  );

  input.value = '';
  display.textContent = '0';
}

document.getElementById("clearBtn").addEventListener("click", ()=>{
  document.getElementById("player").value='';
  document.getElementById("banker").value='';
  document.getElementById("displayPlayer").textContent='0';
  document.getElementById("displayBanker").textContent='0';
  document.getElementById("predictBox").style.display='none';
});

/* ===== STORAGE ===== */
function loadHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];}
  catch(e){return [];}
}

function saveHistory(h){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

/* ===== CORE ===== */
function normalizeResult(r){
  if(r==="PLAYER") return "P";
  if(r==="BANKER") return "B";
  return "D";
}

function trendAnalysis(){
  const hist = loadHistory();
  let score = {P:0,B:0,D:0};

  hist.slice(-CONFIG.shortTrend).forEach((h,i)=>{
    score[normalizeResult(h.result)] += (i+1)*2;
  });

  hist.slice(-CONFIG.longTrend).forEach(h=>{
    score[normalizeResult(h.result)] += 1;
  });

  return score;
}

function markovPrediction(){
  const hist = loadHistory();
  let score = {P:0,B:0,D:0};

  if(hist.length < 4) return score;

  let seq = hist.slice(-3).map(x=>normalizeResult(x.result)).join("");

  for(let i=0;i<hist.length-3;i++){
    let pattern = hist.slice(i,i+3).map(x=>normalizeResult(x.result)).join("");

    if(pattern===seq){
      let next = normalizeResult(hist[i+3].result);
      score[next]+=4;
    }
  }

  return score;
}

function chaosDetector(){
  const hist = loadHistory();
  if(hist.length<6) return false;

  let last6 = hist.slice(-6).map(x=>normalizeResult(x.result)).join("");

  return (
    last6==="PBPBPB" ||
    last6==="BPBPBP"
  );
}

function baccaratFeature(p,b){
  let score = {P:0,B:0,D:0};

  if(p>b) score.P+=3;
  if(b>p) score.B+=3;

  if(Math.abs(p-b)<=CONFIG.drawThreshold) score.D+=5;

  if(p>=8) score.P+=2;
  if(b>=8) score.B+=2;

  if(p===b) score.D+=8;

  if((p+b)%2===0){
    score.B+=1.2;
  }else{
    score.P+=1.2;
  }

  return score;
}

function calcConfidence(finalScore){
  let vals = Object.values(finalScore).sort((a,b)=>b-a);
  let diff = vals[0]-vals[1];
  return Math.min(99, Math.max(55, CONFIG.confidenceBase + diff*6));
}

function vipPredict(player, banker){
  let finalScore = {P:0,B:0,D:0};

  let base = baccaratFeature(player, banker);
  let trend = trendAnalysis();
  let markov = markovPrediction();

  finalScore.P += base.P + trend.P*0.35 + markov.P*0.8;
  finalScore.B += base.B + trend.B*0.35 + markov.B*0.8;
  finalScore.D += base.D + trend.D*0.35 + markov.D*0.8;

  if(chaosDetector()){
    finalScore.P*=0.85;
    finalScore.B*=0.85;
    finalScore.D*=1.3;
  }

  finalScore.B*=1.06;

  let prediction="PLAYER";

  if(finalScore.B > finalScore.P && finalScore.B > finalScore.D){
    prediction="BANKER";
  }

  if(finalScore.D > finalScore.P && finalScore.D > finalScore.B){
    prediction="HÒA";
  }

  return {
    final: prediction,
    confidence: calcConfidence(finalScore),
    scores: finalScore
  };
}

/* ===== SELF LEARNING ===== */
function vipRecord(actual){
  if(!window._lastPrediction){
    alert("Hãy dự đoán trước");
    return;
  }

  let hist = loadHistory();

  hist.push({
    inputP: window._lastPrediction.player,
    inputB: window._lastPrediction.banker,
    prediction: window._lastPrediction.result.final,
    result: actual,
    confidence: window._lastPrediction.result.confidence,
    time: Date.now()
  });

  saveHistory(hist);

  alert("AI đã học kết quả: " + actual);
}

/* ===== MAIN BUTTON ===== */
document.getElementById("predictBtn").addEventListener("click", ()=>{
  const p = Number(document.getElementById("player").value);
  const b = Number(document.getElementById("banker").value);

  if(Number.isNaN(p) || Number.isNaN(b)){
    alert("Nhập đủ PLAYER và BANKER");
    return;
  }

  const result = vipPredict(p,b);

  window._lastPrediction = {
    player:p,
    banker:b,
    result
  };

  document.getElementById("predictBox").style.display="block";

  const circle = document.getElementById("predCircle");
  const text = document.getElementById("predResult");

  if(result.final==="PLAYER"){
    circle.textContent="P";
    circle.className="circle flash-blue";
    text.innerHTML=`PLAYER 🔵<br>${result.confidence}%`;
  }
  else if(result.final==="BANKER"){
    circle.textContent="B";
    circle.className="circle flash-red";
    text.innerHTML=`BANKER 🔴<br>${result.confidence}%`;
  }
  else{
    circle.textContent="H";
    circle.className="circle flash-green";
    text.innerHTML=`HÒA 🟢<br>${result.confidence}%`;
  }
});
</script>

</body>
</html>
