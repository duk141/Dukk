<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>👾 TOOL BCR V2 👾</title>

<style>
body{
  background:#000;
  font-family:Arial,sans-serif;
  color:#fff;
  margin:0;
  padding:0;
}
.wrap{
  max-width:400px;
  margin:20px auto;
  padding:20px;
  background:#000;
  border-radius:12px;
  box-shadow:0 0 20px #ff5f87,0 0 40px #ff5f87 inset;
}
h1{
  text-align:center;
  font-size:22px;
  color:#0ff;
  text-shadow:0 0 5px #0ff,0 0 10px #0ff;
}
label{
  display:block;
  margin-top:15px;
  color:#00faff;
  font-size:16px;
  text-shadow:0 0 5px #00faff;
}

/* Ẩn input gốc */
input{
  display:none;
}

/* Màn hình hiển thị */
.display{
  width:100%;
  padding:15px;
  margin-top:8px;
  border-radius:10px;
  border:2px solid #a24bff;
  background:#000;
  color:#fff;
  font-size:28px;
  text-align:center;
  box-sizing:border-box;
  box-shadow:0 0 8px #a24bff,0 0 12px #a24bff inset;
}

/* Keypad */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}
.keypad button{
  padding:16px;
  border:none;
  border-radius:10px;
  font-size:22px;
  font-weight:bold;
  background:#111;
  color:#fff;
  box-shadow:0 0 10px #ff5f87;
}
.keypad button:active{
  transform:scale(0.95);
}

/* Action buttons */
#predictBtn{
  width:100%;
  margin-top:20px;
  padding:14px;
  font-size:20px;
  font-weight:bold;
  background:#ff5f87;
  color:#fff;
  border:none;
  border-radius:10px;
  box-shadow:0 0 10px #ff5f87,0 0 20px #ff5f87 inset;
}
#clearBtn{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#333;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* Predict box */
.predict{
  margin-top:25px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px #ff5f87,0 0 30px #ff5f87 inset;
  display:none;
}
.circle{
  width:130px;
  height:130px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-weight:800;
  margin:0 auto 15px;
  background:transparent;
}
#predResult{
  text-align:center;
  font-size:24px;
  font-weight:800;
}

/* Flash */
@keyframes pulseRed{
  0%{box-shadow:0 0 20px #ff3b3b;background:#ff3b3b;}
  50%{box-shadow:0 0 40px #ff3b3b;transform:scale(1.1);}
  100%{box-shadow:0 0 20px #ff3b3b;background:#ff3b3b;}
}
@keyframes pulseBlue{
  0%{box-shadow:0 0 20px #00bfff;background:#00bfff;}
  50%{box-shadow:0 0 40px #00bfff;transform:scale(1.1);}
  100%{box-shadow:0 0 20px #00bfff;background:#00bfff;}
}
@keyframes pulseGreen{
  0%{box-shadow:0 0 20px #2eb82e;background:#2eb82e;}
  50%{box-shadow:0 0 40px #2eb82e;transform:scale(1.1);}
  100%{box-shadow:0 0 20px #2eb82e;background:#2eb82e;}
}
.flash-red{animation:pulseRed 1.5s infinite;color:#fff;}
.flash-blue{animation:pulseBlue 1.5s infinite;color:#fff;}
.flash-green{animation:pulseGreen 1.5s infinite;color:#fff;}

.activeBox{
  border-color:#ff5f87 !important;
  box-shadow:0 0 15px #ff5f87,0 0 20px #ff5f87 inset !important;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>👾 TOOL BCR V2 👾</h1>

  <label>PLAYER</label>
  <input id="player" type="number">
  <div id="displayPlayer" class="display activeBox">0</div>

  <label>BANKER</label>
  <input id="banker" type="number">
  <div id="displayBanker" class="display">0</div>

  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="clearNum()">C</button>
    <button onclick="press(0)">0</button>
    <button onclick="switchBox()">↔</button>
  </div>

  <button id="predictBtn">🔮 Dự đoán</button>
  <button id="clearBtn">Xoá tất cả</button>

  <div class="predict" id="predictBox">
    <div class="circle" id="predCircle">?</div>
    <div id="predResult">—</div>
  </div>
</div>

<script>
const HISTORY_KEY='bcr_history_v15_final';
const WEIGHTS_KEY='bcr_weights_v15_final';
const SHORT_TERM_N=3;
const DRAW_THRESHOLD=1;
const LR_DEFAULT=0.25;

let current='player';

/* ===== UI INPUT ===== */
function switchBox(){
  current = current === 'player' ? 'banker' : 'player';
  document.getElementById('displayPlayer').classList.remove('activeBox');
  document.getElementById('displayBanker').classList.remove('activeBox');
  document.getElementById(current === 'player' ? 'displayPlayer' : 'displayBanker').classList.add('activeBox');
}

function press(num){
  const input = document.getElementById(current);
  const display = document.getElementById(current === 'player' ? 'displayPlayer':'displayBanker');

  input.value = num;
  display.textContent = num;

  switchBox();
}

function clearNum(){
  const input = document.getElementById(current);
  const display = document.getElementById(current === 'player' ? 'displayPlayer':'displayBanker');
  input.value='';
  display.textContent='0';
}

document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('player').value='';
  document.getElementById('banker').value='';
  document.getElementById('displayPlayer').textContent='0';
  document.getElementById('displayBanker').textContent='0';
  document.getElementById('predictBox').style.display='none';
});

/* ===== AI ===== */
function loadHistory(){
  try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}
  catch(e){return [];}
}

function loadWeights(){
  try{
    const raw=localStorage.getItem(WEIGHTS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    P:[-3,0,1,0,3,1],
    B:[3,0,-1,0,-3,1],
    D:[0,0,0,0,0,2],
    lr:LR_DEFAULT
  };
}

function features(p,b){
  const v1=p>b?1:(p<b?-1:0);
  const r=(p+1)/(b+1);
  const v2=r>1.2?1:(r<0.8?-1:0);
  const d3=(p%3)-(b%3);
  const v3=d3>0?1:(d3<0?-1:0);
  const v4=Math.abs(p-b)>=4?(p>b?1:-1):0;
  const d5=(p%4)-(b%4);
  const v5=d5>0?1:(d5<0?-1:0);
  const v6=Math.abs(p-b)<=DRAW_THRESHOLD?1:0;
  return [v1,v2,v3,v4,v5,v6];
}

function dot(w,vs){
  let s=0;
  for(let i=0;i<vs.length;i++) s+=(w[i]||0)*vs[i];
  return s;
}

function shortTermBias(){
  const hist=loadHistory();
  if(hist.length<SHORT_TERM_N) return null;
  const last=hist.slice(-SHORT_TERM_N);
  const cnt={PLAYER:0,BANKER:0};
  last.forEach(h=>{
    if(h.result==='PLAYER') cnt.PLAYER++;
    if(h.result==='BANKER') cnt.BANKER++;
  });
  if(cnt.PLAYER>=2) return 'PLAYER';
  if(cnt.BANKER>=2) return 'BANKER';
  return null;
}

function predict(p,b){
  const w=loadWeights();
  const vs=features(p,b);

  let sP=dot(w.P,vs);
  let sB=dot(w.B,vs);
  let sD=dot(w.D,vs);

  const bias=shortTermBias();
  if(bias==='PLAYER') sP+=1;
  if(bias==='BANKER') sB+=1;

  if(vs[5]===1 && sD>=sP && sD>=sB) return 'HÒA';
  return sP>=sB?'PLAYER':'BANKER';
}

/* ===== Predict Button ===== */
document.getElementById('predictBtn').addEventListener('click',()=>{
  const p=Number(document.getElementById('player').value);
  const b=Number(document.getElementById('banker').value);

  if(Number.isNaN(p)||Number.isNaN(b)){
    alert('Nhập đủ PLAYER và BANKER');
    return;
  }

  const result = predict(p,b);

  document.getElementById('predictBox').style.display='block';

  const circle=document.getElementById('predCircle');
  const resultEl=document.getElementById('predResult');

  if(result==='PLAYER'){
    circle.textContent='P';
    circle.className='circle flash-blue';
    resultEl.textContent='PLAYER 🔵';
  }else if(result==='BANKER'){
    circle.textContent='B';
    circle.className='circle flash-red';
    resultEl.textContent='BANKER 🔴';
  }else{
    circle.textContent='H';
    circle.className='circle flash-green';
    resultEl.textContent='HÒA 🟢';
  }
});
</script>
</body>
</html>
