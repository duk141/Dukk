<body>
<div class="wrap">
<h1>ðŸ‘¾ TOOL BCR V2 ðŸ‘¾</h1>
<div>
<label>PLAYER</label>
<input id="player" placeholder="Nháº­p Ä‘iá»ƒm PLAYER" type="number"/>
<label>BANKER</label>
<input id="banker" placeholder="Nháº­p Ä‘iá»ƒm BANKER" type="number"/>
</div>
<div class="actions">
<button class="primary" id="predictBtn">Dá»± Ä‘oÃ¡n</button>
<button class="ghost" id="clearBtn">XoÃ¡</button>
</div>
<div class="predict" id="predictBox" style="display:none;">
<div class="row">
<div class="circle" id="predCircle">?</div>
<div style="flex:1">
<div id="predResult" style="font-size:20px;font-weight:800">â€”</div>

<script>
/* v15-final: learning perceptron-like multi-class with short-term bias and draw handling + clear button */

const HISTORY_KEY = 'bcr_history_v15_final';
const WEIGHTS_KEY = 'bcr_weights_v15_final'; // object {P:[], B:[], D:[], lr:0.2}
const STATS_KEY = 'bcr_stats_v15_final';
const SHORT_TERM_N = 3; // remember last N outcomes for bias
const DRAW_THRESHOLD = 1; // |P-B| <=1 considered potential draw
const LR_DEFAULT = 0.25;

function loadHistory(){ try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[]}catch(e){return [];} }
function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }
function loadWeights(){
  try{
    const raw = localStorage.getItem(WEIGHTS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // default init (balanced)
  return {
    P: [-3,0,1,0,3,1], // 6 features (5 + draw)
    B: [3,0,-1,0,-3,1],
    D: [0,0,0,0,0,2], // draw classifier focuses on draw feature
    lr: LR_DEFAULT
  };
}
function saveWeights(w){ localStorage.setItem(WEIGHTS_KEY, JSON.stringify(w)); }
function loadStats(){ try{return JSON.parse(localStorage.getItem(STATS_KEY))||{}}catch(e){return {}} }
function saveStats(s){ localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

// features: v1..v5 as before, v6 = draw indicator (1 if |p-b|<=DRAW_THRESHOLD else 0)
function features(p,b){
  const v1 = p>b ? 1 : (p<b ? -1 : 0);
  const r = (p+1)/(b+1);
  const v2 = r>1.2 ? 1 : (r<0.8 ? -1 : 0);
  const d3 = (p%3)-(b%3);
  const v3 = d3>0 ? 1 : (d3<0 ? -1 : 0);
  const v4 = Math.abs(p-b)>=4 ? (p>b ? 1 : -1) : 0;
  const d5 = (p%4)-(b%4);
  const v5 = d5>0 ? 1 : (d5<0 ? -1 : 0);
  const v6 = Math.abs(p-b) <= DRAW_THRESHOLD ? 1 : 0;
  return [v1,v2,v3,v4,v5,v6, r];
}

function dot(w, vs){
  let s=0; for(let i=0;i<vs.length;i++) s += (w[i]||0)*vs[i]; return s;
}

function shortTermBias(){
  const hist = loadHistory();
  if(hist.length < SHORT_TERM_N) return null;
  const last = hist.slice(-SHORT_TERM_N);
  const cnt = {PLAYER:0, BANKER:0, 'HÃ’A':0};
  last.forEach(h=> cnt[h.result] = (cnt[h.result]||0)+1 );
  if(cnt.PLAYER >= 2) return {who:'PLAYER', bias:1.0};
  if(cnt.BANKER >= 2) return {who:'BANKER', bias:1.0};
  return null;
}

function predict(p,b){
  const wobj = loadWeights();
  const f = features(p,b);
  const vs = f.slice(0,6);
  const r = f[6];
  let sP = dot(wobj.P, vs);
  let sB = dot(wobj.B, vs);
  let sD = dot(wobj.D, vs);
  const bias = shortTermBias();
  if(bias){
    if(bias.who === 'PLAYER') sP += bias.bias;
    if(bias.who === 'BANKER') sB += bias.bias;
  }
  if(vs[5] === 1 && sD >= sP && sD >= sB) return {final:'HÃ’A', scores:{P:sP,B:sB,D:sD}, vs, r: r.toFixed(3)};
  const final = sP >= sB ? 'PLAYER' : 'BANKER';
  return {final, scores:{P:sP,B:sB,D:sD}, vs, r: r.toFixed(3)};
}

// perceptron-like update (one-vs-all)
function updateWeights(p,b,actual){
  const wobj = loadWeights();
  const f = features(p,b);
  const vs = f.slice(0,6);
  const lr = wobj.lr || LR_DEFAULT;
  const target = {PLAYER:0, BANKER:0, 'HÃ’A':0};
  target[actual] = 1;
  ['PLAYER','BANKER','HÃ’A'].forEach(cls=>{
    const arr = (cls==='PLAYER'? wobj.P : (cls==='BANKER'? wobj.B : wobj.D));
    const t = target[cls];
    if(t === 1){
      for(let i=0;i<vs.length;i++) arr[i] = (arr[i]||0) + lr * vs[i];
    } else {
      for(let i=0;i<vs.length;i++) arr[i] = (arr[i]||0) - lr * vs[i]*0.4;
    }
  });
  saveWeights(wobj);
}

function record(actualTag, realP, realB){
  const hist = loadHistory();
  const last = window._lastPrediction || null;
  if(!last){ alert('ChÆ°a cÃ³ dá»± Ä‘oÃ¡n'); return; }
  const entry = {
    inP: last.inP, inB: last.inB,
    pred: last.out.final,
    realP: realP, realB: realB,
    result: actualTag,
    time: Date.now()
  };
  hist.push(entry);
  saveHistory(hist);
  updateWeights(last.inP, last.inB, actualTag);
  const stats = loadStats();
  stats.total = (stats.total||0) + 1;
  if(!stats.correct) stats.correct = 0;
  if(actualTag === last.out.final) stats.correct += 1;
  saveStats(stats);
  setStatus('âœ… ÄÃ£ lÆ°u: ' + actualTag, actualTag === 'HÃ’A' ? '#28a745' : '#1c6ef2');
}

function setStatus(text,color){
  const el = document.getElementById('saveStatus');
  el.style.display='block'; el.style.color = color || '#fff'; el.textContent = text;
  setTimeout(()=>{ el.style.display='none'; }, 3000);
}

let lastPrediction = null;

document.getElementById('predictBtn').addEventListener('click', ()=>{
  const p = Number(document.getElementById('player').value);
  const b = Number(document.getElementById('banker').value);
  if(Number.isNaN(p) || Number.isNaN(b)){ alert('Nháº­p Ä‘á»§ 2 sá»‘'); return; }
  const out = predict(p,b);
  window._lastPrediction = {inP:p, inB:b, out};
  lastPrediction = window._lastPrediction;
  document.getElementById('predictBox').style.display = 'block';
  const resEl = document.getElementById('predResult');
  resEl.textContent = out.final === 'PLAYER' ? 'PLAYER ðŸ”µ' : (out.final === 'BANKER' ? 'BANKER ðŸ”´' : 'HÃ’A ðŸŸ¢');
  document.getElementById('predDetail').textContent = '';
  document.getElementById('predCircle').textContent = out.final === 'PLAYER' ? 'P' : (out.final === 'BANKER' ? 'B' : 'H');
  const cls = out.final === 'PLAYER' ? 'flash-blue' : (out.final === 'BANKER' ? 'flash-red' : 'flash-green');
  document.getElementById('predCircle').className = 'circle ' + cls;
  document.getElementById('realPlayer').value = ''; document.getElementById('realBanker').value = '';
  document.getElementById('saveStatus').style.display = 'none'; document.getElementById('saveStatus').textContent = '';
});

// clear button: clear inputs and reset prediction display (do not touch history)
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.getElementById('player').value = '';
  document.getElementById('banker').value = '';
  document.getElementById('predictBox').style.display = 'none';
  document.getElementById('predCircle').textContent = '?';
  document.getElementById('predCircle').className = 'circle';
  document.getElementById('predResult').textContent = 'â€”';
  document.getElementById('predDetail').textContent = 'â€”';
  window._lastPrediction = null;
});

document.getElementById('markCorrect').addEventListener('click', ()=>{
  const rp = document.getElementById('realPlayer').value;
  const rb = document.getElementById('realBanker').value;
  record('PLAYER', rp === '' ? null : Number(rp), rb === '' ? null : Number(rb));
});
document.getElementById('markWrong').addEventListener('click', ()=>{
  const rp = document.getElementById('realPlayer').value;
  const rb = document.getElementById('realBanker').value;
  record('BANKER', rp === '' ? null : Number(rp), rb === '' ? null : Number(rb));
});
document.getElementById('markDraw').addEventListener('click', ()=>{
  const rp = document.getElementById('realPlayer').value;
  const rb = document.getElementById('realBanker').value;
  record('HÃ’A', rp === '' ? null : Number(rp), rb === '' ? null : Number(rb));
});

document.getElementById('showHistBtn').addEventListener('click', ()=>{
  const box = document.getElementById('historyBox');
  box.style.display = 'block';
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  const hist = loadHistory();
  if(hist.length === 0){ list.innerHTML = '<div class="muted">ChÆ°a cÃ³ báº£n ghi nÃ o.</div>'; return; }
  hist.forEach(h=>{
    const d = document.createElement('div');
    d.className = 'history-entry';
    const inp = 'Nháº­p : PLAYER=' + h.inP + ', BANKER=' + h.inB;
    const res = 'Káº¿t quáº£ : PLAYER=' + (h.realP===null?'-':h.realP) + ', BANKER=' + (h.realB===null?'-':h.realB);
    const pred = '=> Káº¿t quáº£ dá»± Ä‘oÃ¡n : ' + h.result + ' (dá»± Ä‘oÃ¡n: ' + h.pred + ')';
    const time = new Date(h.time).toLocaleString();
    d.textContent = time + '\n' + inp + '\n' + res + '\n' + pred;
    list.appendChild(d);
  });
});

document.getElementById('closeHistBtn').addEventListener('click', ()=>{
  document.getElementById('historyBox').style.display = 'none';
});
</script>
